steps:
  - id: sim
    task: sim.sweep_csv
    inputs: {}
    params:
      mechanism_path: ${mechanism.path}
      conditions_file: ${benchmarks.conditions_file}
      model: gri30
  - id: g
    task: graphs.build
    inputs: { runs: "@sim" }
    params: {}
  - id: f
    task: features.run
    inputs: { runs: "@sim", graph: "@g" }
    params:
      features:
        timeseries_summary: {}
        rop_wdot_summary:
          top_n: 80
  - id: sens
    task: sensitivity.multiplier_fd
    inputs: { runs: "@sim" }
    params:
      observables:
        gas_composition:
          stats: [last]
          species: [CO2]
      targets: ["gas.CO2.last"]
      eps: 0.05
      top_k: 40
  - id: red
    task: reduction.threshold_prune
    inputs: { graph: "@g", features: "@f" }
    params:
      threshold:
        score_lt: 1.0e-4
  - id: viz
    task: viz.chem_dashboard
    inputs: { runs: "@sim", graph: "@g", features: "@f", sensitivity: "@sens" }
    params: { dashboard: chem }
