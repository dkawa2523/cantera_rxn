steps:
  - id: sim_base
    task: sim.sweep_csv
    inputs: {}
    params:
      mechanism_path: ${mechanism.path}
      conditions_file: ${benchmarks.conditions_file}
      model: gri30
  - id: obs
    task: observables.compute
    inputs: { runs: "@sim_base" }
    params:
      observables:
        gas_composition:
          stats: [last]
          species: [CO2, CO]
  - id: opt
    task: optimization.random_search
    inputs: { runs: "@sim_base", observables: "@obs" }
    params:
      # multi-objective example: maximize CO2_final, minimize CO_final
      observables:
        gas_composition:
          stats: [last]
          species: [CO2, CO]
      objectives:
        - name: maximize_CO2
          target: "gas.CO2.last"
          direction: max
        - name: minimize_CO
          target: "gas.CO.last"
          direction: min
      samples: 80
      seed: 0
  - id: viz
    task: viz.ds_dashboard
    inputs: { optimization: "@opt" }
    params: { dashboard: ds }
