steps:
  - id: sim
    task: sim.sweep_csv
    inputs: {}
    params:
      mechanism_path: ${mechanism.path}
      conditions_file: ${benchmarks.conditions_file}
      model: gri30
  - id: obs
    task: observables.compute
    inputs: { runs: "@sim" }
    params:
      observables:
        gas_composition:
          stats: [last]
          species: [CO2, CO]
  - id: sens
    task: sensitivity.multiplier_fd
    inputs: { runs: "@sim", observables: "@obs" }
    params:
      observables:
        gas_composition:
          stats: [last]
          species: [CO2, CO]
      targets: ["gas.CO2.last", "gas.CO.last"]
      eps: 0.05
      top_k: 60
  - id: viz
    task: viz.ds_dashboard
    inputs: { runs: "@sim", observables: "@obs", sensitivity: "@sens" }
    params: { dashboard: ds }
