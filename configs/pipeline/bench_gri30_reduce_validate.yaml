steps:
  - id: sim_full
    task: sim.sweep_csv
    inputs: {}
    params:
      mechanism_path: ${mechanism.path}
      conditions_file: ${benchmarks.conditions_file}
      model: gri30
  - id: g
    task: graphs.build
    inputs: { runs: "@sim_full" }
    params: {}
  - id: f
    task: features.run
    inputs: { runs: "@sim_full", graph: "@g" }
    params:
      features:
        rop_wdot_summary:
          top_n: 100
  - id: red
    task: reduction.threshold_prune
    inputs: { graph: "@g", features: "@f" }
    params:
      threshold:
        score_lt: 1.0e-4
  - id: sim_red
    task: sim.sweep_csv
    inputs: {}
    params:
      mechanism_path: ${mechanism.path}
      conditions_file: ${benchmarks.conditions_file}
      model: gri30
      mechanism_patch: "@red"
  - id: val
    task: reduction.validate
    inputs: { runs_base: "@sim_full", runs_reduced: "@sim_red" }
    params:
      metrics:
        - name: CO2_final_rmse
          target: "gas.CO2.last"
        - name: CO_final_rmse
          target: "gas.CO.last"
      tolerances:
        CO2_final_rmse: 0.03
        CO_final_rmse: 0.03
  - id: viz
    task: viz.ds_dashboard
    inputs: { validation: "@val", graph: "@g" }
    params: { dashboard: ds }
