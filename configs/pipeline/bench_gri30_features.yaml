steps:
  - id: sim
    task: sim.sweep_csv
    inputs: {}
    params:
      mechanism_path: ${mechanism.path}
      conditions_file: ${benchmarks.conditions_file}
      model: gri30
  - id: g
    task: graphs.build
    inputs: { runs: "@sim" }
    params: {}
  - id: f
    task: features.run
    inputs: { runs: "@sim", graph: "@g" }
    params:
      features:
        timeseries_summary: {}
        rop_wdot_summary:
          top_n: 50
  - id: viz
    task: viz.ds_dashboard
    inputs: { runs: "@sim", graph: "@g", features: "@f" }
    params: { dashboard: ds }
